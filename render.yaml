services:
  - type: web
    name: ai-research-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn research.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: research-db
          property: connectionString

databases:
  - name: research-db
    plan: free
